name: Genesis Handler

on:
  issues:
    # `reopened` lets us retry a failed run by closing + reopening the
    # issue. validate.py already short-circuits if the processing label
    # is set, so accidentally reopening a successful run is a no-op
    # unless the label is removed first.
    types: [opened, reopened]

# Cap one in-flight workflow per architect. Sequential per-author execution
# prevents race conditions in the rate-limit checks and ensures the
# post-validation step in `manifest` correctly identifies its own PR.
concurrency:
  group: genesis-${{ github.event.issue.user.login }}
  cancel-in-progress: false

# Fail-closed defaults: each job declares only what it needs.
permissions: {}

jobs:
  notify-discord:
    # Pings the Herald's Discord webhook the moment an issue is opened —
    # before validation runs. Even a denied/refused submission gets a ping.
    # Runs in parallel with `validate` (no `needs:`) so it doesn't block.
    # `continue-on-error` so a stale webhook URL doesn't fail the workflow.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Ping
        continue-on-error: true
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          AUTHOR: ${{ github.event.issue.user.login }}
          BODY: ${{ github.event.issue.body }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set — skipping ping."
            exit 0
          fi
          python3 - <<'PY'
          import json, os, urllib.request
          title  = os.environ["ISSUE_TITLE"]
          url    = os.environ["ISSUE_URL"]
          author = os.environ["AUTHOR"]
          body   = (os.environ.get("BODY") or "").strip()
          excerpt = body[:240] + ("…" if len(body) > 240 else "")
          msg = f"🌱 **New Sprout issue** from `@{author}`\n**{title}**"
          if excerpt:
              msg += f"\n> {excerpt}"
          msg += f"\n{url}"
          req = urllib.request.Request(
              os.environ["WEBHOOK_URL"],
              method="POST",
              headers={"Content-Type": "application/json"},
              data=json.dumps({"content": msg, "username": "The Herald"}).encode(),
          )
          urllib.request.urlopen(req, timeout=10)
          print("Posted to Discord.")
          PY

  validate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    outputs:
      proceed: ${{ steps.gate.outputs.proceed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - id: gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          AUTHOR_LOGIN: ${{ github.event.issue.user.login }}
          # Optional: comma-separated GitHub logins. If non-empty, only
          # those architects may submit. Leave unset to keep the void
          # open to anyone who passes the other laws.
          GENESIS_ALLOWLIST: ${{ vars.GENESIS_ALLOWLIST }}
        run: python scripts/validate.py

  manifest:
    needs: validate
    if: needs.validate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write
      # Required by anthropics/claude-code-action — it uses OIDC to
      # validate the OAuth token. Without this, the action fails with
      # "Could not fetch an OIDC token".
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      # Stage the architect's title and body to files so the prompt below
      # never interpolates untrusted content. The prompt only references
      # paths and the issue number — both GitHub-controlled.
      - name: Stage the architect's decree
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p .genesis
          printf '%s' "$ISSUE_TITLE" > .genesis/title.txt
          printf '%s' "$ISSUE_BODY"  > .genesis/body.txt

      # Invoke Claude Code with no shell, no network, no git, no gh.
      # The action's wrapper still commits Claude's edits to a `claude/*`
      # branch and (typically) opens a PR — that PR is what the
      # post-validation step then inspects and either merges or closes.
      - name: Invoke the Genesis Builder
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--allowedTools Edit,Write,Read,Glob,Grep --disallowedTools Bash,WebFetch,WebSearch,TodoWrite"
          prompt: |
            You are the Genesis Builder for this repository.

            **Read `CLAUDE.md` in the repository root and obey every law it contains.**

            The triggering architect is **@${{ github.event.issue.user.login }}**.
            The issue number is **${{ github.event.issue.number }}**.

            The architect's TITLE is in `.genesis/title.txt`.
            The architect's BODY is in `.genesis/body.txt`.

            Read both files. Then:

            1. Judge the request. If harmful or rule-violating per `CLAUDE.md`, write the reason to `.genesis/refused.txt` and stop.
            2. Otherwise, manifest the requested files using only `Write` and `Edit`. Stay strictly in scope. Do not touch `.github/`, `scripts/`, `requirements.txt`, `README.md`, `CLAUDE.md`, or `.gitignore`. Do not write outside the repository root.
            3. Stop when the files are written. Do not commit. Do not open PRs. Do not comment on the issue. The workflow's post-validation step will inspect what you wrote, reject if it violates any law, and merge if all is well.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Claude wrote files into the runner's working tree but the
      # custom-prompt mode of claude-code-action doesn't auto-commit.
      # If anything was written (and it wasn't a refusal), commit it on
      # a branch named `genesis/issue-N` and open a PR. The next step
      # finds that PR and either merges or closes it.
      - name: Commit the manifestation
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          set -e
          if [ -f .genesis/refused.txt ]; then
            echo "Refusal staged by Claude — no commit needed."
            exit 0
          fi
          # The Claude Code Action mutates the remote URL during its
          # internal git ops to use a short-lived App-scoped token. By
          # the time we run, that token is dead. Reset to the workflow's
          # GITHUB_TOKEN so push works against our declared permissions.
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          # Belt-and-suspenders: also strip any extraheader the Action
          # injected, so it can't override the URL-embedded credential.
          git config --unset-all "http.https://github.com/.extraheader" || true
          git config user.name  "Genesis Builder"
          git config user.email "genesis@cooli.ai"
          git add -A
          if git diff --cached --quiet; then
            echo "No file changes from Claude."
            exit 0
          fi
          BR="genesis/issue-${ISSUE_NUMBER}"
          git checkout -b "$BR"
          git commit -m "Genesis: manifest from Issue #${ISSUE_NUMBER}"
          git push -u origin "$BR"
          gh pr create \
            --base main --head "$BR" \
            --title "Genesis: ${ISSUE_TITLE}" \
            --body "Manifested from Issue #${ISSUE_NUMBER}." || true

      # Defense-in-depth: inspect the actual diff and either merge or
      # close the PR. This is the load-bearing security layer — Claude's
      # promises are advisory; the file modes, paths, and sizes are not.
      - name: Validate the manifestation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          WORKFLOW_STARTED: ${{ github.event.issue.created_at }}
        run: python scripts/validate_manifestation.py

      # If the manifestation merged, prepend a row to MANIFESTATIONS.md
      # and push directly to main. The log file is in FORBIDDEN_FILES
      # so Claude can never tamper with it; only this step can update it.
      - name: Update Manifestations log
        if: ${{ !cancelled() && hashFiles('.genesis/merged.txt') != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -e
          # Pull the freshly-merged main and run the log generator there.
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          python scripts/update_log.py
          python scripts/update_index.py
          if git diff --quiet -- MANIFESTATIONS.md index.html; then
            echo "Log + gallery already up to date."
            exit 0
          fi
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git config --unset-all "http.https://github.com/.extraheader" || true
          git config user.name  "Genesis Builder"
          git config user.email "genesis@cooli.ai"
          git add MANIFESTATIONS.md index.html
          # [skip ci] keeps this commit from re-firing the workflow.
          git commit -m "Log + gallery: Issue #${ISSUE_NUMBER} [skip ci]"
          git push origin main
